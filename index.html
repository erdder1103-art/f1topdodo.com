<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>F1TOP-朵朵-注册送10USDT体验金</title>

  <script>
    window.APP_CONFIG = {
      PIXEL_IDS: ["1253230530214080"],

      CHAT_WIDGET_URL: "https://customer-chat-system-production.up.railway.app/widget.js",

      CHAT_SITE: "f1top-10usdt",
      CHAT_TITLE: "F1-TOP 注册送10USDT体验金",
      CHAT_CAMPAIGN: "FB-官方广告"
    };

    !function(f,b,e,v,n,t,s){
      if(f.fbq) return;
      n=f.fbq=function(){
        n.callMethod ? n.callMethod.apply(n,arguments) : n.queue.push(arguments);
      };
      if(!f._fbq) f._fbq=n;
      n.push=n;
      n.loaded=!0;
      n.version='2.0';
      n.queue=[];
      t=b.createElement(e);
      t.async=!0;
      t.src=v;
      s=b.getElementsByTagName(e)[0];
      s.parentNode.insertBefore(t,s);
    }(window, document, 'script', 'https://connect.facebook.net/en_US/fbevents.js');

    window.APP_CONFIG.PIXEL_IDS.forEach(function(pixelId){
      fbq("init", pixelId);
    });

    fbq("track", "PageView");
  </script>

  <noscript>
    <img height="1" width="1" style="display:none"
      src="https://www.facebook.com/tr?id=1253230530214080&ev=PageView&noscript=1" alt="" />
  </noscript>

  <style>
    :root {
      --max-w: 430px;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      width: 100%;
      min-height: 100%;
      background: #000;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans TC", Arial, sans-serif;
    }

    body {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      min-height: 100svh;
      overflow: hidden;
    }

    .stage {
      width: min(100vw, var(--max-w));
      aspect-ratio: 9 / 16;
      position: relative;
      overflow: hidden;
      background: #000;
    }

    .bg {
      position: absolute;
      inset: 0;
      background: url("./images/bg.jpg") center / cover no-repeat;
      z-index: 0;
    }

    .logo {
      position: absolute;
      top: 10px;
      left: 10px;
      width: 105px;
      z-index: 5;
      pointer-events: none;
      user-select: none;
      -webkit-user-drag: none;
    }

    .coins-layer {
      position: absolute;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
      z-index: 2;
    }

    .btn-wrap {
      position: absolute;
      left: 50%;
      bottom: -40px;
      transform: translateX(-50%);
      width: 88%;
      max-width: 350px;
      z-index: 10;
    }

    .cta-link {
      display: block;
      width: 100%;
      text-decoration: none;
      -webkit-tap-highlight-color: transparent;
      animation: breatheGlow 1.45s ease-in-out infinite;
    }

    .btn-img {
      width: 100%;
      display: block;
      cursor: pointer;
      user-select: none;
      -webkit-user-drag: none;
      transition: transform .12s ease, opacity .12s ease;
    }

    .cta-link:active .btn-img {
      transform: scale(.97);
    }

    .cta-link.is-disabled,
    .tg-fab.is-disabled {
      pointer-events: none;
      opacity: .95;
    }

    @keyframes breatheGlow {
      0% {
        filter: drop-shadow(0 0 0 rgba(255, 215, 0, 0));
        transform: scale(1);
      }
      50% {
        filter: drop-shadow(0 0 20px rgba(255, 215, 0, .65));
        transform: scale(1.025);
      }
      100% {
        filter: drop-shadow(0 0 0 rgba(255, 215, 0, 0));
        transform: scale(1);
      }
    }

    .tg-fab {
      position: absolute;
      right: 14px;
      top: 55%;
      transform: translateY(-50%);
      width: 58px;
      height: 58px;
      z-index: 12;
      display: block;
      background: url("./images/tg.png") center / contain no-repeat;
      filter: drop-shadow(0 7px 12px rgba(0, 0, 0, .35));
      animation: tgBreathe 1.5s ease-in-out infinite;
      -webkit-tap-highlight-color: transparent;
    }

    .tg-fab::after {
      content: "客服";
      position: absolute;
      left: 50%;
      bottom: -22px;
      transform: translateX(-50%);
      white-space: nowrap;
      padding: 3px 8px;
      border-radius: 999px;
      background: rgba(0, 0, 0, .72);
      color: #ffd966;
      font-size: 12px;
      font-weight: 800;
      border: 1px solid rgba(255, 217, 102, .55);
    }

    @keyframes tgBreathe {
      0% {
        transform: translateY(-50%) scale(1);
      }
      50% {
        transform: translateY(-50%) scale(1.08);
      }
      100% {
        transform: translateY(-50%) scale(1);
      }
    }

    .coin {
      position: absolute;
      top: -12%;
      width: var(--size);
      height: var(--size);
      border-radius: 50%;
      background: radial-gradient(circle at 30% 30%, #fff3b0 0%, #ffd166 25%, #f4b400 55%, #c98a00 100%);
      box-shadow: 0 10px 18px rgba(0, 0, 0, .28);
      opacity: .95;
      animation: fall linear forwards, spin linear infinite;
    }

    @keyframes fall {
      to {
        transform: translate3d(0, 130vh, 0) rotate(360deg);
        opacity: 0;
      }
    }

    @keyframes spin {
      to {
        rotate: 360deg;
      }
    }
  </style>
</head>

<body>
  <div class="stage">
    <div class="bg"></div>
    <div class="coins-layer" id="coinsLayer"></div>

    <img src="./images/logo.png" class="logo" alt="F1 logo" loading="eager" />

    <div class="btn-wrap">
      <a href="#chat"
         class="cta-link"
         id="ctaBtn"
         data-area="main_cta"
         aria-label="Open Online Support"
         rel="noopener">
        <img src="./images/btn.png" class="btn-img" alt="点击下载 注册送10U礼包" loading="eager" />
      </a>
    </div>

    <a class="tg-fab"
       id="tgSupport"
       href="#chat"
       rel="noopener"
       data-area="tg_support"
       aria-label="Online Support"></a>
  </div>

  <script>
    (function(){
      var CHAT_WIDGET_URL = window.APP_CONFIG.CHAT_WIDGET_URL;
      var CHAT_SITE = window.APP_CONFIG.CHAT_SITE || "f1top-10usdt";
      var CHAT_TITLE = window.APP_CONFIG.CHAT_TITLE || "F1-TOP 注册送10USDT体验金";
      var CHAT_CAMPAIGN = window.APP_CONFIG.CHAT_CAMPAIGN || "FB-广告A";

      var layer = document.getElementById("coinsLayer");
      var ctaBtn = document.getElementById("ctaBtn");
      var tgSupport = document.getElementById("tgSupport");

      var coinTimer = null;
      var isOpening = false;

      ctaBtn.href = "#chat";
      tgSupport.href = "#chat";

      function createEventId(prefix) {
        var id = "";

        if (window.crypto && typeof window.crypto.randomUUID === "function") {
          id = window.crypto.randomUUID();
        } else {
          id = "xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx".replace(/[xy]/g, function(c){
            var r = Math.random() * 16 | 0;
            var v = c === "x" ? r : (r & 0x3 | 0x8);
            return v.toString(16);
          });
        }

        return prefix + "_" + id;
      }

      function fbTrack(eventName, params, options) {
        try {
          if (typeof fbq === "function") {
            fbq("track", eventName, params || {}, options || {});
          }
        } catch(e) {}
      }

      function fbTrackCustom(eventName, params, options) {
        try {
          if (typeof fbq === "function") {
            fbq("trackCustom", eventName, params || {}, options || {});
          }
        } catch(e) {}
      }

      function trackChatOpen(area) {
        var params = {
          content_name: "site_chat_open",
          content_category: "onsite_support",
          contact_method: "site_chat",
          click_area: area || "main_cta",
          destination: "internal_chat",
          source_site: CHAT_SITE,
          source_title: CHAT_TITLE,
          campaign: CHAT_CAMPAIGN,
          value: 1.00,
          currency: "USD"
        };

        fbTrack("Lead", params, { eventID: createEventId("lead") });
        fbTrack("Contact", params, { eventID: createEventId("contact") });
        fbTrackCustom("SiteChatOpen", params, { eventID: createEventId("site_chat_open") });
      }

      function normalizeWidgetUrl(url) {
        url = String(url || "");

        if (!url) return "";

        if (url.indexOf("http://") !== 0 && url.indexOf("https://") !== 0) {
          url = "https://" + url;
        }

        return url;
      }

      function buildChatPageHtml() {
        var widgetUrl = normalizeWidgetUrl(CHAT_WIDGET_URL);

        if (!widgetUrl) {
          widgetUrl = "https://customer-chat-system-production.up.railway.app/widget.js";
        }

        var widgetUrlWithCache = widgetUrl + (widgetUrl.indexOf("?") === -1 ? "?v=" : "&v=") + Date.now();

        return '<!doctype html>' +
          '<html lang="zh-CN">' +
          '<head>' +
          '<meta charset="utf-8">' +
          '<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">' +
          '<title>在线客服</title>' +
          '<style>' +
          'html,body{margin:0;width:100%;height:100%;background:#050505;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans TC",Arial,sans-serif;overflow:hidden;}' +
          '.chat-bg{position:fixed;inset:0;background:radial-gradient(circle at top,#3a2805 0%,#111 42%,#000 100%);}' +
          '.chat-card{position:fixed;left:50%;top:50%;transform:translate(-50%,-50%);width:min(92vw,420px);padding:24px 18px;border:1px solid rgba(255,214,90,.45);border-radius:20px;background:rgba(12,12,12,.94);box-shadow:0 18px 50px rgba(0,0,0,.65);text-align:center;color:#fff;z-index:10;}' +
          '.chat-title{font-size:22px;font-weight:900;color:#ffd966;margin-bottom:8px;}' +
          '.chat-text{font-size:14px;line-height:1.6;color:#ddd;}' +
          '.chat-loading{margin-top:16px;font-size:13px;color:#ffd966;}' +
          '.manual-open{margin-top:16px;border:0;border-radius:999px;padding:10px 18px;background:#ffd033;color:#111;font-weight:900;font-size:14px;cursor:pointer;}' +
          '</style>' +
          '</head>' +
          '<body>' +
          '<div class="chat-bg"></div>' +
          '<div class="chat-card" id="loadingCard">' +
          '<div class="chat-title">在线客服</div>' +
          '<div class="chat-text">正在为您连接客服，请稍候...</div>' +
          '<div class="chat-loading">Loading...</div>' +
          '<button class="manual-open" id="manualOpenBtn" type="button">打开客服</button>' +
          '</div>' +

          '<script>' +
          '(function(){' +
          'var opened=false;' +

          'function visible(el){' +
          'if(!el)return false;' +
          'var r=el.getBoundingClientRect();' +
          'var s=window.getComputedStyle(el);' +
          'return r.width>20&&r.height>20&&s.display!=="none"&&s.visibility!=="hidden"&&s.opacity!=="0";' +
          '}' +

          'function tryOpenChat(){' +
          'if(window.CustomerChat&&typeof window.CustomerChat.open==="function"){' +
          'window.CustomerChat.open();' +
          'opened=true;' +
          'return true;' +
          '}' +

          'var selectors=[' +
          '"#customerChatButton",' +
          '"#chatButton",' +
          '"#chat-widget-button",' +
          '"#customer-chat-button",' +
          '".customer-chat-button",' +
          '".chat-widget-button",' +
          '".chat-button",' +
          '".chat-float-button",' +
          '".chat-launcher",' +
          '"[data-chat-open]",' +
          '"[data-customer-chat-open]"' +
          '];' +

          'for(var i=0;i<selectors.length;i++){' +
          'var btn=document.querySelector(selectors[i]);' +
          'if(btn&&visible(btn)){' +
          'btn.click();' +
          'opened=true;' +
          'return true;' +
          '}' +
          '}' +

          'var all=document.querySelectorAll("button,a,div");' +
          'var best=null;' +
          'var bestScore=-999999;' +
          'for(var j=0;j<all.length;j++){' +
          'var el=all[j];' +
          'if(!visible(el))continue;' +
          'var r=el.getBoundingClientRect();' +
          'var score=r.left+r.top;' +
          'var text=(el.innerText||el.getAttribute("aria-label")||el.className||"").toString().toLowerCase();' +
          'if(text.indexOf("chat")!==-1||text.indexOf("客服")!==-1||text.indexOf("support")!==-1){score+=100000;}' +
          'if(r.left>window.innerWidth*0.55&&r.top>window.innerHeight*0.55){score+=50000;}' +
          'if(score>bestScore){bestScore=score;best=el;}' +
          '}' +
          'if(best){best.click();opened=true;return true;}' +
          'return false;' +
          '}' +

          'function hideLoadingLater(){' +
          'setTimeout(function(){' +
          'var card=document.getElementById("loadingCard");' +
          'if(card&&opened){card.style.display="none";}' +
          '},1200);' +
          '}' +

          'var s=document.createElement("script");' +
          's.src=' + JSON.stringify(widgetUrlWithCache) + ';' +
          's.async=true;' +
          's.defer=true;' +
          's.setAttribute("data-site",' + JSON.stringify(CHAT_SITE) + ');' +
          's.setAttribute("data-title",' + JSON.stringify(CHAT_TITLE) + ');' +
          's.setAttribute("data-campaign",' + JSON.stringify(CHAT_CAMPAIGN) + ');' +
          's.setAttribute("data-auto-open","true");' +
          's.setAttribute("data-open-delay","300");' +
          's.setAttribute("data-button-text","💬");' +

          's.onload=function(){' +
          'var tries=0;' +
          'var timer=setInterval(function(){' +
          'tries++;' +
          'if(tryOpenChat()){' +
          'clearInterval(timer);' +
          'hideLoadingLater();' +
          '}' +
          'if(tries>=40){' +
          'clearInterval(timer);' +
          'var card=document.getElementById("loadingCard");' +
          'if(card){card.querySelector(".chat-loading").innerText="请点击下方按钮打开客服";}' +
          '}' +
          '},250);' +
          '};' +

          's.onerror=function(){' +
          'var card=document.getElementById("loadingCard");' +
          'if(card){card.innerHTML="<div class=\\"chat-title\\">客服载入失败</div><div class=\\"chat-text\\">请返回上一页后重新点击。</div>";}' +
          '};' +

          'document.body.appendChild(s);' +

          'var manual=document.getElementById("manualOpenBtn");' +
          'if(manual){manual.addEventListener("click",function(){tryOpenChat();hideLoadingLater();});}' +
          '})();' +
          '<\/script>' +

          '</body>' +
          '</html>';
      }

      function openChatWindow(area) {
        if (isOpening) return;
        isOpening = true;

        ctaBtn.classList.add("is-disabled");
        tgSupport.classList.add("is-disabled");

        trackChatOpen(area);

        var chatWin = window.open("about:blank", "_blank");

        if (!chatWin) {
          openChatInCurrentPage();
          resetState();
          return;
        }

        try {
          chatWin.document.open();
          chatWin.document.write(buildChatPageHtml());
          chatWin.document.close();
        } catch(e) {
          try {
            chatWin.close();
          } catch(closeErr) {}

          openChatInCurrentPage();
        }

        resetState();
      }

      function openChatInCurrentPage() {
        var widgetUrl = normalizeWidgetUrl(CHAT_WIDGET_URL);

        if (!widgetUrl) {
          alert("客服系统网址未设置");
          return;
        }

        var oldScript = document.getElementById("customerChatWidgetLoader");
        if (oldScript && oldScript.parentNode) {
          oldScript.parentNode.removeChild(oldScript);
        }

        var script = document.createElement("script");
        script.id = "customerChatWidgetLoader";
        script.src = widgetUrl + (widgetUrl.indexOf("?") === -1 ? "?v=" : "&v=") + Date.now();
        script.async = true;
        script.defer = true;

        script.setAttribute("data-site", CHAT_SITE);
        script.setAttribute("data-title", CHAT_TITLE);
        script.setAttribute("data-campaign", CHAT_CAMPAIGN);
        script.setAttribute("data-auto-open", "true");
        script.setAttribute("data-open-delay", "300");
        script.setAttribute("data-button-text", "💬");

        script.onload = function(){
          var tries = 0;
          var timer = setInterval(function(){
            tries++;

            if (window.CustomerChat && typeof window.CustomerChat.open === "function") {
              clearInterval(timer);
              window.CustomerChat.open();
              return;
            }

            var possible = document.querySelector(
              "#customerChatButton,#chatButton,#chat-widget-button,#customer-chat-button,.customer-chat-button,.chat-widget-button,.chat-button,.chat-float-button,.chat-launcher,[data-chat-open],[data-customer-chat-open]"
            );

            if (possible) {
              clearInterval(timer);
              possible.click();
              return;
            }

            if (tries >= 40) {
              clearInterval(timer);
            }
          }, 250);
        };

        script.onerror = function(){
          alert("客服系统载入失败，请稍后再试。");
        };

        document.body.appendChild(script);
      }

      function resetState() {
        isOpening = false;
        ctaBtn.classList.remove("is-disabled");
        tgSupport.classList.remove("is-disabled");
      }

      function spawnCoin() {
        if (!layer) return;

        var coin = document.createElement("div");
        coin.className = "coin";

        var size = Math.floor(10 + Math.random() * 18);
        var left = Math.random() * 100;
        var dur = 6.5 + Math.random() * 4.5;
        var spinDur = .8 + Math.random() * 1.2;

        coin.style.setProperty("--size", size + "px");
        coin.style.left = left + "%";
        coin.style.animationDuration = dur + "s, " + spinDur + "s";

        layer.appendChild(coin);

        setTimeout(function(){
          if (coin && coin.parentNode) coin.parentNode.removeChild(coin);
        }, dur * 1000 + 300);
      }

      function startCoins() {
        if (coinTimer) return;

        coinTimer = setInterval(function(){
          var n = 1 + Math.floor(Math.random() * 2);
          for (var i = 0; i < n; i++) spawnCoin();
        }, 900);
      }

      function stopCoins() {
        if (!coinTimer) return;
        clearInterval(coinTimer);
        coinTimer = null;
      }

      startCoins();

      document.addEventListener("visibilitychange", function(){
        if (document.hidden) stopCoins();
        else startCoins();
      });

      window.addEventListener("pageshow", function(event){
        if (event.persisted) resetState();
        else isOpening = false;
      });

      ctaBtn.addEventListener("click", function(e){
        e.preventDefault();
        openChatWindow(this.getAttribute("data-area") || "main_cta");
      }, { passive: false });

      tgSupport.addEventListener("click", function(e){
        e.preventDefault();
        openChatWindow(this.getAttribute("data-area") || "tg_support");
      }, { passive: false });
    })();
  </script>
</body>
</html>
