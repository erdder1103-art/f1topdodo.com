<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>F1-TOP-注册送10USDT体验金</title>

<script>
  window.APP_CONFIG = {
    PIXEL_IDS: ["1253230530214080"],
    TARGET_URL: "https://t.me/F1top10usdt_bot",

    CHAT_WIDGET_URL: "https://customer-chat-system-production.up.railway.app/widget.js",

    CHAT_SITE: "f1top-10usdt",
    CHAT_TITLE: "F1-TOP 注册送10USDT体验金",
    CHAT_CAMPAIGN: "FB-广告A",

    REDIRECT_DELAY: 800
  };

    !function(f,b,e,v,n,t,s){
      if(f.fbq) return;
      n=f.fbq=function(){
        n.callMethod ? n.callMethod.apply(n,arguments) : n.queue.push(arguments);
      };
      if(!f._fbq) f._fbq=n;
      n.push=n;
      n.loaded=!0;
      n.version='2.0';
      n.queue=[];
      t=b.createElement(e);
      t.async=!0;
      t.src=v;
      s=b.getElementsByTagName(e)[0];
      s.parentNode.insertBefore(t,s);
    }(window, document, 'script', 'https://connect.facebook.net/en_US/fbevents.js');

    window.APP_CONFIG.PIXEL_IDS.forEach(function(pixelId){
      fbq("init", pixelId);
    });

    fbq("track", "PageView");
  </script>

  <noscript>
    <img height="1" width="1" style="display:none"
      src="https://www.facebook.com/tr?id=1253230530214080&ev=PageView&noscript=1" alt="" />
  </noscript>

  <style>
    :root {
      --max-w: 430px;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      width: 100%;
      min-height: 100%;
      background: #000;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans TC", Arial, sans-serif;
    }

    body {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      min-height: 100svh;
      overflow: hidden;
    }

    .stage {
      width: min(100vw, var(--max-w));
      aspect-ratio: 9 / 16;
      position: relative;
      overflow: hidden;
      background: #000;
    }

    .bg {
      position: absolute;
      inset: 0;
      background: url("./images/bg.jpg") center / cover no-repeat;
      z-index: 0;
    }

    .logo {
      position: absolute;
      top: 10px;
      left: 10px;
      width: 105px;
      z-index: 5;
      pointer-events: none;
      user-select: none;
      -webkit-user-drag: none;
    }

    .coins-layer {
      position: absolute;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
      z-index: 2;
    }

    .btn-wrap {
      position: absolute;
      left: 50%;
      bottom: -40px;
      transform: translateX(-50%);
      width: 88%;
      max-width: 350px;
      z-index: 10;
    }

    .cta-link {
      display: block;
      width: 100%;
      text-decoration: none;
      -webkit-tap-highlight-color: transparent;
      animation: breatheGlow 1.45s ease-in-out infinite;
    }

    .btn-img {
      width: 100%;
      display: block;
      cursor: pointer;
      user-select: none;
      -webkit-user-drag: none;
      transition: transform .12s ease, opacity .12s ease;
    }

    .cta-link:active .btn-img {
      transform: scale(.97);
    }

    .cta-link.is-disabled,
    .chat-fab.is-disabled {
      pointer-events: none;
      opacity: .95;
    }

    @keyframes breatheGlow {
      0% {
        filter: drop-shadow(0 0 0 rgba(255, 215, 0, 0));
        transform: scale(1);
      }
      50% {
        filter: drop-shadow(0 0 20px rgba(255, 215, 0, .65));
        transform: scale(1.025);
      }
      100% {
        filter: drop-shadow(0 0 0 rgba(255, 215, 0, 0));
        transform: scale(1);
      }
    }

    /*
      右侧客服按钮
      如果你想继续使用原本 tg.png 图标，这里会自动使用 ./images/tg.png
      点了之后不会跳 Telegram，会打开站内客服聊天窗口
    */
    .chat-fab {
      position: absolute;
      right: 14px;
      top: 55%;
      transform: translateY(-50%);
      width: 58px;
      height: 58px;
      z-index: 12;
      display: block;
      border: 0;
      padding: 0;
      cursor: pointer;
      border-radius: 50%;
      background: url("./images/tg.png") center / contain no-repeat;
      filter: drop-shadow(0 7px 12px rgba(0, 0, 0, .35));
      animation: chatBreathe 1.5s ease-in-out infinite;
      -webkit-tap-highlight-color: transparent;
    }

    .chat-fab::after {
      content: "客服";
      position: absolute;
      left: 50%;
      bottom: -22px;
      transform: translateX(-50%);
      white-space: nowrap;
      padding: 3px 8px;
      border-radius: 999px;
      background: rgba(0, 0, 0, .72);
      color: #ffd966;
      font-size: 12px;
      font-weight: 800;
      border: 1px solid rgba(255, 217, 102, .55);
    }

    @keyframes chatBreathe {
      0% {
        transform: translateY(-50%) scale(1);
      }
      50% {
        transform: translateY(-50%) scale(1.08);
      }
      100% {
        transform: translateY(-50%) scale(1);
      }
    }

    .coin {
      position: absolute;
      top: -12%;
      width: var(--size);
      height: var(--size);
      border-radius: 50%;
      background: radial-gradient(circle at 30% 30%, #fff3b0 0%, #ffd166 25%, #f4b400 55%, #c98a00 100%);
      box-shadow: 0 10px 18px rgba(0, 0, 0, .28);
      opacity: .95;
      animation: fall linear forwards, spin linear infinite;
    }

    @keyframes fall {
      to {
        transform: translate3d(0, 130vh, 0) rotate(360deg);
        opacity: 0;
      }
    }

    @keyframes spin {
      to {
        rotate: 360deg;
      }
    }
  </style>
</head>

<body>
  <div class="stage">
    <div class="bg"></div>
    <div class="coins-layer" id="coinsLayer"></div>

    <img src="./images/logo.png" class="logo" alt="F1 logo" loading="eager" />

    <div class="btn-wrap">
      <a href="https://t.me/F1top10usdt_bot"
         class="cta-link"
         id="ctaBtn"
         data-area="main_cta"
         aria-label="Open Telegram Bot"
         rel="noopener">
        <img src="./images/btn.png" class="btn-img" alt="点击下载 注册送10U礼包" loading="eager" />
      </a>
    </div>

    <!-- 右侧客服按钮：已改成打开站内聊天室，不再跳 Telegram -->
    <button
      class="chat-fab"
      id="openChatBtn"
      type="button"
      data-area="site_chat_support"
      aria-label="Open Online Support"></button>
  </div>

  <script>
    (function(){
      var TARGET_URL = window.APP_CONFIG.TARGET_URL;
      var REDIRECT_DELAY = window.APP_CONFIG.REDIRECT_DELAY;

      var layer = document.getElementById("coinsLayer");
      var ctaBtn = document.getElementById("ctaBtn");
      var openChatBtn = document.getElementById("openChatBtn");

      var coinTimer = null;
      var isRedirecting = false;
      var redirectTimer = null;

      ctaBtn.href = TARGET_URL;

      function createEventId(prefix) {
        var id = "";

        if (window.crypto && typeof window.crypto.randomUUID === "function") {
          id = window.crypto.randomUUID();
        } else {
          id = "xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx".replace(/[xy]/g, function(c){
            var r = Math.random() * 16 | 0;
            var v = c === "x" ? r : (r & 0x3 | 0x8);
            return v.toString(16);
          });
        }

        return prefix + "_" + id;
      }

      function fbTrack(eventName, params, options) {
        try {
          if (typeof fbq === "function") {
            fbq("track", eventName, params || {}, options || {});
          }
        } catch(e) {}
      }

      function fbTrackCustom(eventName, params, options) {
        try {
          if (typeof fbq === "function") {
            fbq("trackCustom", eventName, params || {}, options || {});
          }
        } catch(e) {}
      }

      function trackBotClick(area) {
        var params = {
          content_name: "telegram_bot_click",
          content_category: "telegram_redirect",
          contact_method: "telegram",
          click_area: area || "main_cta",
          destination: "telegram_bot",
          value: 1.00,
          currency: "USD"
        };

        fbTrack("Lead", params, { eventID: createEventId("lead") });
        fbTrackCustom("TelegramBotClick", params, { eventID: createEventId("telegram_bot_click") });
      }

      function trackChatClick(area) {
        var params = {
          content_name: "site_chat_click",
          content_category: "onsite_support",
          contact_method: "site_chat",
          click_area: area || "site_chat_support",
          destination: "internal_chat",
          source_site: window.APP_CONFIG.CHAT_SITE || "",
          source_title: window.APP_CONFIG.CHAT_TITLE || "",
          campaign: window.APP_CONFIG.CHAT_CAMPAIGN || ""
        };

        fbTrack("Contact", params, { eventID: createEventId("contact") });
        fbTrackCustom("SiteChatClick", params, { eventID: createEventId("site_chat_click") });
      }

      function go(url) {
        window.location.href = url;
      }

      function resetState() {
        isRedirecting = false;

        if (redirectTimer) {
          clearTimeout(redirectTimer);
          redirectTimer = null;
        }

        ctaBtn.classList.remove("is-disabled");
        openChatBtn.classList.remove("is-disabled");
      }

      function spawnCoin() {
        if (!layer) return;

        var coin = document.createElement("div");
        coin.className = "coin";

        var size = Math.floor(10 + Math.random() * 18);
        var left = Math.random() * 100;
        var dur = 6.5 + Math.random() * 4.5;
        var spinDur = .8 + Math.random() * 1.2;

        coin.style.setProperty("--size", size + "px");
        coin.style.left = left + "%";
        coin.style.animationDuration = dur + "s, " + spinDur + "s";

        layer.appendChild(coin);

        setTimeout(function(){
          if (coin && coin.parentNode) coin.parentNode.removeChild(coin);
        }, dur * 1000 + 300);
      }

      function startCoins() {
        if (coinTimer) return;

        coinTimer = setInterval(function(){
          var n = 1 + Math.floor(Math.random() * 2);
          for (var i = 0; i < n; i++) spawnCoin();
        }, 900);
      }

      function stopCoins() {
        if (!coinTimer) return;
        clearInterval(coinTimer);
        coinTimer = null;
      }

      function openCustomerChat() {
        trackChatClick(openChatBtn.getAttribute("data-area") || "site_chat_support");

        if (window.CustomerChat && typeof window.CustomerChat.open === "function") {
          window.CustomerChat.open();
          return;
        }

        var retryCount = 0;
        var retryTimer = setInterval(function(){
          retryCount++;

          if (window.CustomerChat && typeof window.CustomerChat.open === "function") {
            clearInterval(retryTimer);
            window.CustomerChat.open();
          }

          if (retryCount >= 20) {
            clearInterval(retryTimer);
          }
        }, 150);
      }

      startCoins();

      document.addEventListener("visibilitychange", function(){
        if (document.hidden) stopCoins();
        else startCoins();
      });

      window.addEventListener("pageshow", function(event){
        if (event.persisted) resetState();
        else isRedirecting = false;
      });

      ctaBtn.addEventListener("click", function(e){
        e.preventDefault();

        if (isRedirecting) return;

        isRedirecting = true;
        ctaBtn.classList.add("is-disabled");
        openChatBtn.classList.add("is-disabled");

        trackBotClick(this.getAttribute("data-area") || "main_cta");

        redirectTimer = setTimeout(function(){
          go(TARGET_URL);
        }, REDIRECT_DELAY);
      }, { passive: false });

      openChatBtn.addEventListener("click", function(e){
        e.preventDefault();
        openCustomerChat();
      }, { passive: false });
    })();
  </script>

  <!-- 站内客服系统：请把 CHAT_WIDGET_URL 换成你的 Railway 客服系统网址 -->
  <script>
    (function(){
      var src = window.APP_CONFIG.CHAT_WIDGET_URL;

      if (!src || src.indexOf("你的Railway網址") !== -1) {
        console.warn("请先把 window.APP_CONFIG.CHAT_WIDGET_URL 改成你的 Railway 客服系统 widget.js 网址");
        return;
      }

      var script = document.createElement("script");
      script.src = src;
      script.async = true;
      script.defer = true;

      script.setAttribute("data-site", window.APP_CONFIG.CHAT_SITE || "f1top-10usdt");
      script.setAttribute("data-title", window.APP_CONFIG.CHAT_TITLE || "F1-TOP 注册送10USDT体验金");
      script.setAttribute("data-campaign", window.APP_CONFIG.CHAT_CAMPAIGN || "FB-广告A");

      /*
        打开落地页后自动弹出聊天室
        true = 自动弹出
        false = 不自动弹出，只显示按钮
      */
      script.setAttribute("data-auto-open", "true");

      /*
        自动弹出延迟毫秒
        900 = 0.9秒
      */
      script.setAttribute("data-open-delay", "900");

      /*
        聊天室右下角默认按钮文字
        如果你已经有页面右侧客服按钮，也可以保留这个
      */
      script.setAttribute("data-button-text", "💬");

      document.body.appendChild(script);
    })();
  </script>
</body>
</html>
