      PIXEL_IDS: ["1253230530214080"],

      CHAT_WIDGET_URL: "https://customer-chat-system-production.up.railway.app/widget.js?v=official-ad-20260507",

      CHAT_SITE: "f1top-10usdt-official",

      CHAT_CAMPAIGN: "官方-广告",
      CHAT_SOURCE_GROUP: "官方-广告",
      CHAT_SOURCE_LABEL: "官方-注册送10USDT"
    };

    !function(f,b,e,v,n,t,s){
      if(f.fbq) return;
      n=f.fbq=function(){
        n.callMethod ? n.callMethod.apply(n,arguments) : n.queue.push(arguments);
      };
      if(!f._fbq) f._fbq=n;
      n.push=n;
      n.loaded=!0;

      t=b.createElement(e);

    }(window, document, 'script', 'https://connect.facebook.net/en_US/fbevents.js');

    window.APP_CONFIG.PIXEL_IDS.forEach(function(pixelId){
      fbq("init", pixelId);

    fbq("track", "PageView");

  <noscript>
    <img height="1" width="1" style="display:none"
      src="https://www.facebook.com/tr?id=1253230530214080&ev=PageView&noscript=1" alt="" />

  <style>
    :root {
      --max-w: 430px;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      width: 100%;
      min-height: 100%;
      background: #000;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans TC", Arial, sans-serif;
    }

    body {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      min-height: 100svh;
      overflow: hidden;
    }

    .stage {
      width: min(100vw, var(--max-w));
      aspect-ratio: 9 / 16;
      position: relative;
      overflow: hidden;
      background: #000;
    }

    .bg {
      position: absolute;
      inset: 0;
      background: url("./images/bg.jpg") center / cover no-repeat;
      z-index: 0;
    }

    .logo {
      position: absolute;
      top: 10px;
      left: 10px;
      width: 105px;
      z-index: 5;
      pointer-events: none;
      user-select: none;
      -webkit-user-drag: none;
    }

    .coins-layer {
      position: absolute;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
      z-index: 2;
    }

    .btn-wrap {
      position: absolute;
      left: 50%;
      bottom: -40px;
      transform: translateX(-50%);
      width: 88%;
      max-width: 350px;
      z-index: 10;
    }

    .cta-link {
      display: block;
      width: 100%;
      text-decoration: none;
      -webkit-tap-highlight-color: transparent;
      animation: breatheGlow 1.45s ease-in-out infinite;
    }

    .btn-img {
      width: 100%;
      display: block;
      cursor: pointer;
      user-select: none;
      -webkit-user-drag: none;
      transition: transform .12s ease, opacity .12s ease;
    }

    .cta-link:active .btn-img {
      transform: scale(.97);
    }

    .cta-link.is-disabled,
    .tg-fab.is-disabled {
      pointer-events: none;
      opacity: .95;
    }

    @keyframes breatheGlow {
      0% {
        filter: drop-shadow(0 0 0 rgba(255, 215, 0, 0));
        transform: scale(1);
      }
      50% {
        filter: drop-shadow(0 0 20px rgba(255, 215, 0, .65));
        transform: scale(1.025);
      }
      100% {
        filter: drop-shadow(0 0 0 rgba(255, 215, 0, 0));
        transform: scale(1);
      }
    }

    .tg-fab {
      position: absolute;
      right: 14px;
      top: 55%;
      transform: translateY(-50%);
      width: 58px;
      height: 58px;
      z-index: 12;
      display: block;
      background: url("./images/tg.png") center / contain no-repeat;
      filter: drop-shadow(0 7px 12px rgba(0, 0, 0, .35));
      animation: tgBreathe 1.5s ease-in-out infinite;
      -webkit-tap-highlight-color: transparent;
    }

    .tg-fab::after {
      content: "客服";
      position: absolute;
      left: 50%;
      bottom: -22px;
      transform: translateX(-50%);
      white-space: nowrap;
      padding: 3px 8px;
      border-radius: 999px;
      background: rgba(0, 0, 0, .72);
      color: #ffd966;
      font-size: 12px;
      font-weight: 800;
      border: 1px solid rgba(255, 217, 102, .55);
    }

    @keyframes tgBreathe {
      0% {
        transform: translateY(-50%) scale(1);
      }
      50% {
        transform: translateY(-50%) scale(1.08);
      }
      100% {
        transform: translateY(-50%) scale(1);
      }
    }

    .coin {
      position: absolute;
      top: -12%;
      width: var(--size);
      height: var(--size);
      border-radius: 50%;
      background: radial-gradient(circle at 30% 30%, #fff3b0 0%, #ffd166 25%, #f4b400 55%, #c98a00 100%);
      box-shadow: 0 10px 18px rgba(0, 0, 0, .28);
      opacity: .95;
      animation: fall linear forwards, spin linear infinite;
    }

    @keyframes fall {
      to {
        transform: translate3d(0, 130vh, 0) rotate(360deg);
        opacity: 0;
      }
    }

    @keyframes spin {
      to {
        rotate: 360deg;
      }
    }
  </style>
</head>

<body>
  <div class="stage">
    <div class="bg"></div>
    <div class="coins-layer" id="coinsLayer"></div>

    <img src="./images/logo.png" class="logo" alt="F1 logo" loading="eager" />

    <div class="btn-wrap">
      <a href="javascript:void(0)"
         class="cta-link"
         id="ctaBtn"
         data-area="main_cta"
         aria-label="Open Online Support"
         rel="noopener">
        <img src="./images/btn.png" class="btn-img" alt="点击下载 注册送10U礼包" loading="eager" />
      </a>
    </div>

    <a class="tg-fab"
       id="tgSupport"
       href="javascript:void(0)"
       rel="noopener"
       data-area="tg_support"
       aria-label="Online Support"></a>
  </div>

  <script>
    (function(){
      var CHAT_WIDGET_URL = window.APP_CONFIG.CHAT_WIDGET_URL;
      var CHAT_SITE = window.APP_CONFIG.CHAT_SITE || "f1top-10usdt-official";
      var CHAT_TITLE = window.APP_CONFIG.CHAT_TITLE || "F1-TOP 注册送10USDT体验金";
      var CHAT_CAMPAIGN = window.APP_CONFIG.CHAT_CAMPAIGN || "官方-广告";
      var CHAT_SOURCE_GROUP = window.APP_CONFIG.CHAT_SOURCE_GROUP || "官方-广告";
      var CHAT_SOURCE_LABEL = window.APP_CONFIG.CHAT_SOURCE_LABEL || "官方-注册送10USDT";

      var layer = document.getElementById("coinsLayer");
      var ctaBtn = document.getElementById("ctaBtn");
      var tgSupport = document.getElementById("tgSupport");

      var coinTimer = null;
      var isOpening = false;
      var widgetLoaded = false;
      var widgetLoading = false;

      function createEventId(prefix) {
        var id = "";

        if (window.crypto && typeof window.crypto.randomUUID === "function") {
          id = window.crypto.randomUUID();
        } else {
          id = "xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx".replace(/[xy]/g, function(c){
            var r = Math.random() * 16 | 0;
            var v = c === "x" ? r : (r & 0x3 | 0x8);
            return v.toString(16);
          });
        }

        return prefix + "_" + id;
      }

      function fbTrack(eventName, params, options) {
        try {
          if (typeof fbq === "function") {
            fbq("track", eventName, params || {}, options || {});
          }
        } catch(e) {}
      }

      function fbTrackCustom(eventName, params, options) {
        try {
          if (typeof fbq === "function") {
            fbq("trackCustom", eventName, params || {}, options || {});
          }
        } catch(e) {}
      }

      function trackChatOpen(area) {
        var params = {
          content_name: "site_chat_open",
          content_category: "onsite_support",
          contact_method: "site_chat",
          click_area: area || "main_cta",
          destination: "internal_chat",
          source_site: CHAT_SITE,
          source_title: CHAT_TITLE,
          campaign: CHAT_CAMPAIGN,
          source_group: CHAT_SOURCE_GROUP,
          source_label: CHAT_SOURCE_LABEL,
          value: 1.00,
          currency: "USD"
        };

        fbTrack("Lead", params, { eventID: createEventId("lead") });
        fbTrack("Contact", params, { eventID: createEventId("contact") });
        fbTrackCustom("SiteChatOpen", params, { eventID: createEventId("site_chat_open") });
      }

      function loadChatWidget(callback) {
        if (widgetLoaded) {
          callback();
          return;
        }

        if (widgetLoading) {
          var waitTimer = setInterval(function(){
            if (widgetLoaded) {
              clearInterval(waitTimer);
              callback();
            }
          }, 80);
          return;
        }

        widgetLoading = true;

        var script = document.createElement("script");
        script.src = CHAT_WIDGET_URL;
        script.async = true;

        script.setAttribute("data-site", CHAT_SITE);
        script.setAttribute("data-title", CHAT_TITLE);
        script.setAttribute("data-campaign", CHAT_CAMPAIGN);
        script.setAttribute("data-source-group", CHAT_SOURCE_GROUP);
        script.setAttribute("data-source-label", CHAT_SOURCE_LABEL);
        script.setAttribute("data-auto-open", "false");
        script.setAttribute("data-open-delay", "300");

        script.onload = function(){
          widgetLoaded = true;
          widgetLoading = false;
          callback();
        };

        script.onerror = function(){
          widgetLoading = false;
          resetState();
          alert("客服聊天室載入失敗，請稍後再試。");
        };

        document.body.appendChild(script);
      }

      function openSiteChat(area) {
        if (isOpening) return;

        isOpening = true;

        ctaBtn.classList.add("is-disabled");
        tgSupport.classList.add("is-disabled");

        trackChatOpen(area);

        loadChatWidget(function(){
          setTimeout(function(){
            if (window.CustomerChat && typeof window.CustomerChat.open === "function") {
              window.CustomerChat.open();
            } else {
              alert("聊天室尚未載入完成，請稍等 1 秒後再點一次。");
            }

            resetState();
          }, 150);
        });
      }

      function resetState() {
        isOpening = false;
        ctaBtn.classList.remove("is-disabled");
        tgSupport.classList.remove("is-disabled");
      }

      function spawnCoin() {
        if (!layer) return;

        var coin = document.createElement("div");
        coin.className = "coin";

        var size = Math.floor(10 + Math.random() * 18);
        var left = Math.random() * 100;
        var dur = 6.5 + Math.random() * 4.5;
        var spinDur = .8 + Math.random() * 1.2;

        coin.style.setProperty("--size", size + "px");
        coin.style.left = left + "%";
        coin.style.animationDuration = dur + "s, " + spinDur + "s";

        layer.appendChild(coin);

        setTimeout(function(){
          if (coin && coin.parentNode) coin.parentNode.removeChild(coin);
        }, dur * 1000 + 300);
      }

      function startCoins() {
        if (coinTimer) return;

        coinTimer = setInterval(function(){
          var n = 1 + Math.floor(Math.random() * 2);
          for (var i = 0; i < n; i++) spawnCoin();
        }, 900);
      }

      function stopCoins() {
        if (!coinTimer) return;
        clearInterval(coinTimer);
        coinTimer = null;
      }

      startCoins();

      document.addEventListener("visibilitychange", function(){
        if (document.hidden) stopCoins();
        else startCoins();
      });

      window.addEventListener("pageshow", function(event){
        if (event.persisted) resetState();
        else isOpening = false;
      });

      ctaBtn.addEventListener("click", function(e){
        e.preventDefault();
        openSiteChat(this.getAttribute("data-area") || "main_cta");
      }, { passive: false });

      tgSupport.addEventListener("click", function(e){
        e.preventDefault();
        openSiteChat(this.getAttribute("data-area") || "tg_support");
      }, { passive: false });
    })();
  </script>
</body>
</html>
